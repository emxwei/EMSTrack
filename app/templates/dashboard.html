<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMSTrack Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="dashboard-body">
    <main class="dashboard-shell">
        <h1 class="page-label">Incident Dashboard</h1>
        <section class="app-frame">
            <header class="topbar">
                <div>
                    <h2 id="dispatcherName">Dispatcher</h2>
                    <span id="pendingBadge">0 Pending Incidents</span>
                </div>
                <button id="logoutBtn">Log out</button>
            </header>

            <section class="workspace">
                <aside class="left-panel">
                    <div class="panel-title-row">
                        <h3>Units</h3>
                    </div>
                    <label class="toggle-row">
                        <input id="hideClaimed" type="checkbox">
                        <span></span>
                        Hide Claimed Units
                    </label>
                    <div id="unitList" class="unit-list"></div>
                    <div class="key-card">
                        <p>KEY</p>
                        <div><span class="dot critical"></span> Critical</div>
                        <div><span class="dot high"></span> High</div>
                        <div><span class="dot medium"></span> Medium</div>
                        <div><span class="dot available"></span> Available</div>
                    </div>
                </aside>

                <section class="map-panel">
                    <div id="map"></div>
                </section>

                <aside class="right-panel">
                    <div class="tabs">
                        <button class="tab active" data-tab="incidents">Active Incidents</button>
                        <button class="tab" data-tab="patients">Patient Details</button>
                        <button class="tab" data-tab="chat">Live Chat</button>
                    </div>
                    <div id="incidentsTab" class="tab-content active"><div id="incidentList"></div></div>
                    <div id="patientsTab" class="tab-content"><div id="patientList"></div></div>
                    <div id="chatTab" class="tab-content">
                        <div id="chatMessages"></div>
                        <form id="chatForm" class="chat-form">
                            <input id="chatInput" type="text" placeholder="Message ambulance crew...">
                            <button type="submit">Send</button>
                        </form>
                    </div>
                </aside>
            </section>
        </section>
    </main>

    <template id="unitTemplate">
        <article class="unit-card">
            <div>
                <h4></h4>
                <p class="unit-status"></p>
                <p class="unit-meta"></p>
            </div>
            <select></select>
        </article>
    </template>

    <template id="incidentTemplate">
        <article class="incident-card">
            <div class="incident-head">
                <span class="priority-pill"></span>
                <span class="incident-status"></span>
            </div>
            <h4></h4>
            <p></p>
            <select class="assign-select"></select>
        </article>
    </template>

    <template id="patientTemplate">
        <article class="incident-card patient-card">
            <div class="incident-head">
                <span class="priority-pill"></span>
                <span class="incident-status"></span>
            </div>

            <div class="patient-read-view">
                <h4 class="patient-read-name"></h4>
                <div class="patient-detail-grid">
                    <div>
                        <span>Chief Complaint</span>
                        <strong class="patient-read-complaint"></strong>
                    </div>
                    <div>
                        <span>Location</span>
                        <strong class="patient-read-location"></strong>
                    </div>
                    <div>
                        <span>Vitals</span>
                        <strong class="patient-read-vitals"></strong>
                    </div>
                    <div>
                        <span>Assigned Unit</span>
                        <strong class="patient-read-unit"></strong>
                    </div>
                </div>
                <button class="edit-patient-button" type="button">Edit Patient Details</button>
            </div>

            <div class="patient-edit-form hidden">
                <label>Patient Name<input class="patient-name-input" type="text"></label>
                <label>Priority
                    <select class="patient-priority-input">
                        <option value="critical">Critical</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                    </select>
                </label>
                <label>Chief Complaint<textarea class="patient-description-input"></textarea></label>
                <label>Location<input class="patient-address-input" type="text"></label>
                <label>Vitals<textarea class="patient-vitals-input" placeholder="Example: BP 120/80, HR 88, SpO2 97%"></textarea></label>
                <div class="patient-button-row">
                    <button class="save-patient-button" type="button">Save Patient Details</button>
                    <button class="cancel-patient-button" type="button">Cancel</button>
                </div>
                <p class="save-patient-status"></p>
            </div>
        </article>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
