<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMSTrack Login</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="login-body">
    <main class="login-shell">
        <h1 class="page-label">Log in</h1>
        <section class="login-card">
            <form id="loginForm" class="login-form">
                <h2>Enter worker credentials</h2>
                <input id="workerId" type="text" placeholder="Worker ID" autocomplete="off">
                <input id="password" type="password" placeholder="Password" autocomplete="current-password">
                <button type="submit">Continue</button>
                <a class="secondary-button" href="/signup">Create account</a>
                <p id="loginError"></p>
            </form>
        </section>
    </main>
    <script src="/static/js/login.js"></script>
</body>
</html>
